groups:
- name: infrastructure_alerts
  rules:
  - alert: HighCPUUsage
    expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (pod) > 0.8
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High CPU usage on {{ $labels.pod }}"
      
  - alert: HighMemoryUsage
    expr: sum(container_memory_usage_bytes) by (pod) / sum(container_spec_memory_limit_bytes) by (pod) > 0.85
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High Memory usage on {{ $labels.pod }}"

  - alert: PodCrashLoopBackOff
    expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "Pod {{ $labels.pod }} is crash looping"

  - alert: DatabaseDown
    expr: up{app="postgres"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "PostgreSQL Database is down"

- name: application_alerts
  rules:
  - alert: HighAPIErrorRate
    expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "High API Error Rate (> 5%)"

  - alert: HighAPILatency
    expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1.0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "API Latency 95th percentile is > 1s"

  - alert: BackendUnhealthy
    expr: up{app="backend"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Backend service is down"

- name: business_alerts
  rules:
  - alert: TooManyHighRiskStudents
    expr: high_risk_students > 20
    for: 1h
    labels:
      severity: warning
    annotations:
      summary: "Over 20 High Risk Students detected in EduPulse"

  - alert: LowPlacementReadiness
    expr: placement_readiness_average < 60
    for: 24h
    labels:
      severity: warning
    annotations:
      summary: "Average Placement Readiness dropped below 60%"

  - alert: InterventionFailureRateHigh
    # Example metric derivation
    expr: (active_interventions / active_students) * 100 > 30
    for: 24h
    labels:
      severity: warning
    annotations:
      summary: "Intervention Rate is exceeding 30% of student body"
