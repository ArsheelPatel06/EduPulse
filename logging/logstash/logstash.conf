input {
  beats {
    port => 5044
  }
}

filter {
  if [kubernetes][container][name] == "backend" {
    # Attempt to parse the message field as JSON for structured business/API logs
    json {
      source => "message"
      target => "parsed_json"
      skip_on_invalid_json => true
    }
    
    if [parsed_json] {
      # Elevate JSON fields to the top level
      mutate {
        merge => { "@timestamp" => "[parsed_json][timestamp]" }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "edupulse-logs-%{+YYYY.MM.dd}"
  }
}
