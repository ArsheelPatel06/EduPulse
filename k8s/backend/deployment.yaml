apiVersion: apps/v1
kind: Deployment
metadata:
  name: edupulse-backend
  namespace: edupulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "edupulse-backend"
        vault.hashicorp.com/agent-inject-secret-database: "secret/data/edupulse/database"
        vault.hashicorp.com/agent-inject-secret-auth: "secret/data/edupulse/auth"
        vault.hashicorp.com/agent-inject-secret-ai: "secret/data/edupulse/ai"
    spec:
      containers:
      - name: backend
        image: your-aws-account-id.dkr.ecr.us-east-1.amazonaws.com/edupulse-backend:v1
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: edupulse-config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
