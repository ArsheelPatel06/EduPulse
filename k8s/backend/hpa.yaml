apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edupulse-backend-hpa
  namespace: edupulse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edupulse-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
