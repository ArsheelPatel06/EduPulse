apiVersion: apps/v1
kind: Deployment
metadata:
  name: edupulse-frontend
  namespace: edupulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: your-aws-account-id.dkr.ecr.us-east-1.amazonaws.com/edupulse-frontend:v1
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: edupulse-config
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
