apiVersion: v1
kind: Secret
metadata:
  name: edupulse-secrets
  namespace: edupulse
type: Opaque
stringData:
  # In a real environment, Vault or AWS Secrets Manager will populate these
  POSTGRES_PASSWORD: "edupulse_password"
  DATABASE_URL: "postgresql://edupulse_user:edupulse_password@edupulse-postgres:5432/edupulse"
  REDIS_URL: "redis://edupulse-redis:6379/0"
  JWT_SECRET: "super_secret_key_change_in_production"
